<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Likes Project - Part 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <h1>Network</h1>
    </nav>

    <div class="main-container">
        <h2>Your Feed</h2>

        <div class="feed-layout">
            <aside class="user-sidebar">
                <div class="user-info">
                    <img src="/Part2/imgs/user.png" alt="User Avatar" class="avatar">
                    <a href="#">Add an avatar</a>
                    <h3>James Doe</h3>
                </div>
            </aside>

            <main class="posts-list">
                
                <div class="post-card">
                    <div class="post-header">
                        <h3>Neil M</h3>
                        <div class="likes-container">
                            <span class="like-count">9</span> like(s)
                            <button class="like-btn">Like</button>
                        </div>
                    </div>
                    <p>I just set up this new discord bot, let me know what you all think. <a href="#">link</a></p>
                </div>

                <div class="post-card">
                    <div class="post-header">
                        <h3>Nichole K</h3>
                        <div class="likes-container">
                            <span class="like-count">12</span> like(s)
                            <button class="like-btn">Like</button>
                        </div>
                    </div>
                    <p>Just finished my <a href="#">next comic</a>, check it out.</p>
                </div>

                <div class="post-card">
                    <div class="post-header">
                        <h3>Jim R</h3>
                        <div class="likes-container">
                            <span class="like-count">9</span> like(s)
                            <button class="like-btn">Like</button>
                        </div>
                    </div>
                    <p>I can't stop listening to the <a href="#">new album</a>. Who else is liking it?</p>
                </div>

            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
